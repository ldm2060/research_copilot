name: Deploy Claude Workspace

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/package-copilot-workspace.yml
      - .gitmodules
      - agent.txt
      - hook.txt
      - skill.txt
      - scripts/build_copilot_workspace.py
      - self/**
      - third_party/**

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build claude workspace bundle
        run: python scripts/build_copilot_workspace.py --repo-root . --output dist/claude-workspace

      - name: Deploy to deploy branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save the bundle content
          BUNDLE_DIR="dist/claude-workspace"

          # Create or reset the deploy orphan branch
          git checkout --orphan deploy
          git rm -rf . 2>/dev/null || true

          # Copy bundle content to root
          cp -r "$BUNDLE_DIR"/. .
          rm -rf dist

          # Commit and force push
          git add -A
          git commit -m "deploy: claude workspace bundle $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty
          git push origin deploy --force

      - name: Sync deploy branch to Gitee
        shell: bash
        run: |
          git remote add gitee https://ldm2060:${{ secrets.GITEE_TOKEN }}@gitee.com/ldm2060/research_copilot.git
          git push gitee deploy --force
