name: Deploy Claude Workspace

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.2.3). Leave empty to auto-generate from run number.'
        required: false
        default: ''
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/package-copilot-workspace.yml
      - .gitmodules
      - agent.txt
      - hook.txt
      - skill.txt
      - scripts/build_copilot_workspace.py
      - 'self/**'
      - '!self/VERSION'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Auto-generate: 1.0.{run_number}
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build claude workspace bundle
        run: |
          python scripts/build_copilot_workspace.py \
            --repo-root . \
            --output dist/claude-workspace \
            --target github \
            --version "${{ steps.version.outputs.version }}"

      - name: Verify bundle
        run: |
          find dist/claude-workspace/.claude-plugin -type f
          cat dist/claude-workspace/.claude-plugin/plugin.json

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-bundle
          path: |
            dist/claude-workspace/
            !dist/claude-workspace/.git
          include-hidden-files: true

  deploy-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-bundle
          path: bundle

      - name: Verify download
        run: find bundle -maxdepth 3 -type f | head -20

      - name: Fetch existing deploy branch
        run: git fetch origin deploy 2>/dev/null || true

      - name: Deploy to GitHub (deploy branch + tag)
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout deploy (orphan if new)
          git checkout --orphan deploy
          git rm -rf . 2>/dev/null || true

          # Copy bundle content to root (including hidden files like .claude-plugin/)
          rsync -a bundle/ .
          rm -rf bundle

          # Commit + tag
          git add -A
          git commit -m "release ${TAG} (github)"
          git tag -f "${TAG}"

          # Prune old releases and tags (keep latest 3)
          ALL_TAGS=$(git tag -l "v*" | sort -V)
          TAG_COUNT=$(echo "$ALL_TAGS" | wc -l)
          if [ "$TAG_COUNT" -gt 3 ]; then
            echo "$ALL_TAGS" | head -n -3 | while read old_tag; do
              echo "  Pruning old tag: ${old_tag}"
              # Delete GitHub Release (ignore if not a release)
              gh release delete "${old_tag}" --yes --cleanup-tag=false 2>/dev/null || true
              # Delete remote tag
              git push origin ":refs/tags/${old_tag}" 2>/dev/null || true
              # Delete local tag
              git tag -d "${old_tag}" 2>/dev/null || true
            done
          fi

          # Push
          git push origin deploy --force
          git push origin "${TAG}"

  deploy-gitee:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-bundle
          path: bundle

      - name: Verify download
        run: find bundle -maxdepth 3 -type f | head -20

      - name: Patch manifests for Gitee
        shell: bash
        run: |
          # Locate files with find
          MARKETPLACE=$(find bundle -name "marketplace.json" | head -1)
          PLUGIN=$(find bundle -name "plugin.json" | grep -v node_modules | head -1)

          if [ -z "$MARKETPLACE" ] || [ -z "$PLUGIN" ]; then
            echo "ERROR: manifest files not found in bundle"
            find bundle -type f | head -20
            exit 1
          fi

          echo "Patching $MARKETPLACE and $PLUGIN"

          python3 -c "
          import json
          # Patch marketplace.json
          m = json.loads(open('$MARKETPLACE').read())
          for pl in m.get('plugins', []):
              pl['source'] = {
                  'source': 'git',
                  'url': 'https://gitee.com/ldm2060/research_copilot',
                  'ref': pl['source']['ref'],
              }
          open('$MARKETPLACE', 'w').write(json.dumps(m, indent=2, ensure_ascii=False) + '\n')

          # Patch plugin.json
          p = json.loads(open('$PLUGIN').read())
          p['repository'] = 'https://gitee.com/ldm2060/research_copilot'
          open('$PLUGIN', 'w').write(json.dumps(p, indent=2, ensure_ascii=False) + '\n')

          print('Done')
          "

      - name: Add Gitee remote
        run: |
          git remote add gitee https://ldm2060:${{ secrets.GITEE_TOKEN }}@gitee.com/ldm2060/research_copilot.git

      - name: Fetch existing deploy branch from Gitee
        run: git fetch gitee deploy 2>/dev/null || true

      - name: Deploy to Gitee (deploy branch + tag)
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="gitee/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout deploy (orphan if new)
          git checkout --orphan deploy
          git rm -rf . 2>/dev/null || true

          # Copy patched bundle content to root (including hidden files)
          rsync -a bundle/ .
          rm -rf bundle

          # Commit + tag
          git add -A
          git commit -m "release ${TAG} (gitee)"
          git tag -f "${TAG}"

          # Prune old gitee releases and tags (keep latest 3)
          ALL_TAGS=$(git tag -l "gitee/v*" | sort -V)
          TAG_COUNT=$(echo "$ALL_TAGS" | wc -l)
          if [ "$TAG_COUNT" -gt 3 ]; then
            echo "$ALL_TAGS" | head -n -3 | while read old_tag; do
              echo "  Pruning old tag: ${old_tag}"
              # Delete Gitee Release via API
              TAG_NAME="${old_tag#gitee/}"
              curl -s -X DELETE \
                "https://gitee.com/api/v5/repos/ldm2060/research_copilot/releases/tags/${TAG_NAME}" \
                -H "Content-Type: application/json" \
                -d "{\"access_token\":\"${{ secrets.GITEE_TOKEN }}\"}" \
                2>/dev/null || true
              # Delete remote tag
              git push gitee ":refs/tags/${old_tag}" 2>/dev/null || true
              # Delete local tag
              git tag -d "${old_tag}" 2>/dev/null || true
            done
          fi

          # Push
          git push gitee deploy --force
          git push gitee "${TAG}"
