name: Deploy Claude Workspace

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - none
  push:
    branches:
      - main
    paths:
      - .github/workflows/package-copilot-workspace.yml
      - .gitmodules
      - agent.txt
      - hook.txt
      - skill.txt
      - scripts/build_copilot_workspace.py
      - 'self/**'
      - '!self/VERSION'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version bump
        id: bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "bump=${{ inputs.version_bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Build claude workspace bundle
        run: |
          python scripts/build_copilot_workspace.py \
            --repo-root . \
            --output dist/claude-workspace \
            --target github \
            --version-bump ${{ steps.bump.outputs.bump }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(cat self/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-bundle
          path: dist/claude-workspace/

  deploy-github:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-bundle
          path: dist/claude-workspace

      - name: Fetch existing deploy branch
        run: git fetch origin deploy 2>/dev/null || true

      - name: Deploy to GitHub (deploy branch + tag)
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout deploy (orphan if new)
          git checkout --orphan deploy
          git rm -rf . 2>/dev/null || true

          # Copy bundle content to root
          cp -r dist/claude-workspace/. .
          rm -rf dist

          # Commit + tag
          git add -A
          git commit -m "release ${TAG} (github)"
          git tag -f "${TAG}"

          # Prune old tags (keep latest 3)
          ALL_TAGS=$(git tag -l "v*" | sort -V)
          TAG_COUNT=$(echo "$ALL_TAGS" | wc -l)
          if [ "$TAG_COUNT" -gt 3 ]; then
            echo "$ALL_TAGS" | head -n -3 | while read old_tag; do
              echo "  Pruning old tag: ${old_tag}"
              git tag -d "${old_tag}" 2>/dev/null || true
              git push origin ":refs/tags/${old_tag}" 2>/dev/null || true
            done
          fi

          # Push
          git push origin deploy --force
          git push origin "${TAG}"

  deploy-gitee:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-bundle
          path: dist/claude-workspace

      - name: Patch marketplace.json for Gitee
        shell: python
        run: |
          import json
          from pathlib import Path

          marketplace_path = Path("dist/claude-workspace/.claude-plugin/marketplace.json")
          data = json.loads(marketplace_path.read_text())
          for plugin in data.get("plugins", []):
              plugin["source"] = {
                  "source": "git",
                  "url": "https://gitee.com/ldm2060/research_copilot",
                  "ref": plugin["source"]["ref"],
              }
          marketplace_path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n")
          print("Patched marketplace.json for Gitee:")
          print(marketplace_path.read_text())

      - name: Patch plugin.json repository for Gitee
        shell: python
        run: |
          import json
          from pathlib import Path

          plugin_path = Path("dist/claude-workspace/.claude-plugin/plugin.json")
          data = json.loads(plugin_path.read_text())
          data["repository"] = "https://gitee.com/ldm2060/research_copilot"
          plugin_path.write_text(json.dumps(data, indent=2, ensure_ascii=False) + "\n")
          print("Patched plugin.json for Gitee:")
          print(plugin_path.read_text())

      - name: Add Gitee remote
        run: |
          git remote add gitee https://ldm2060:${{ secrets.GITEE_TOKEN }}@gitee.com/ldm2060/research_copilot.git

      - name: Fetch existing deploy branch from Gitee
        run: git fetch gitee deploy 2>/dev/null || true

      - name: Deploy to Gitee (deploy branch + tag)
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="gitee/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout deploy (orphan if new)
          git checkout --orphan gitee-deploy
          git rm -rf . 2>/dev/null || true

          # Copy patched bundle content to root
          cp -r dist/claude-workspace/. .
          rm -rf dist

          # Commit + tag
          git add -A
          git commit -m "release ${TAG} (gitee)"
          git tag -f "${TAG}"

          # Prune old gitee tags (keep latest 3)
          ALL_TAGS=$(git tag -l "gitee/v*" | sort -V)
          TAG_COUNT=$(echo "$ALL_TAGS" | wc -l)
          if [ "$TAG_COUNT" -gt 3 ]; then
            echo "$ALL_TAGS" | head -n -3 | while read old_tag; do
              echo "  Pruning old tag: ${old_tag}"
              git tag -d "${old_tag}" 2>/dev/null || true
              git push gitee ":refs/tags/${old_tag}" 2>/dev/null || true
            done
          fi

          # Push
          git push gitee deploy --force
          git push gitee "${TAG}"
