name: Package Copilot Workspace

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the generated bundle as a GitHub release
        type: boolean
        default: false
      release_tag:
        description: Release tag to create when publish_release is true
        type: string
        required: false
      release_name:
        description: Optional release name override
        type: string
        required: false
  push:
    branches:
      - main
    paths:
      - .github/workflows/package-copilot-workspace.yml
      - .gitmodules
      - agent.txt
      - hook.txt
      - skill.txt
      - scripts/build_copilot_workspace.py
      - self/**
      - third_party/**

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Copilot workspace bundle
        run: python scripts/build_copilot_workspace.py --repo-root . --output dist/copilot-workspace

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: copilot-workspace-config
          if-no-files-found: error
          path: |
            dist/copilot-workspace
            dist/copilot-workspace.zip

      - name: Prepare release metadata
        id: release_meta
        if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            name="${{ github.event.inputs.release_name }}"
          else
            short_sha="${GITHUB_SHA::12}"
            tag="copilot-workspace-${short_sha}"
            name="Copilot Workspace ${short_sha}"
          fi

          if [[ -z "$tag" ]]; then
            short_sha="${GITHUB_SHA::12}"
            tag="copilot-workspace-${short_sha}"
          fi

          if [[ -z "$name" ]]; then
            name="$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF"
            echo "Packaged GitHub Copilot workspace bundle."
            echo
            cat dist/copilot-workspace/README.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish bundle release
        if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.release_meta.outputs.body }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/copilot-workspace.zip
            dist/copilot-workspace/BUILD_MANIFEST.json
            dist/copilot-workspace/README.md